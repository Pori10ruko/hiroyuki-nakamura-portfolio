      body {

        margin: 0;
        padding: 0;

        overscroll-behavior-y: none;

      }
      
      html {
        /* Prevent overscroll on the root element */
        overscroll-behavior: none;
      }
      
      #root {
        /* Prevent touch action issues on mobile */
        touch-action: pan-y;
      }

      }

<link rel="stylesheet" href="/index.css">

  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
  (function(){
    var sent={};
    function track(){
      var page=location.hash.replace(/^#/,"")||"/";
      if(sent[page])return;
      sent[page]=1;
      var data=JSON.stringify({page:page,referrer:document.referrer});
      if(navigator.sendBeacon){
        navigator.sendBeacon("/.netlify/functions/track",data);
      }else{
        fetch("/.netlify/functions/track",{method:"POST",body:data,keepalive:true});
      }
    }
    track();
    window.addEventListener("hashchange",track);
  })();
  </script>
</body>
